name: upload artifact

on:
  workflow_dispatch:

jobs:
  uploadArtifact:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: export-files
          path: |
            python_programs/src
            python_programs/requirements.txt
